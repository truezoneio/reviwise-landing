  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f47e6" />
  <meta name="apple-mobile-web-app-title" content="Reviwise" />
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .Params.description }}" />
  {{ with .Params.keywords }}
  <meta name="keywords" content="{{ delimit . ", " }}" />
  {{ end }}
  <meta name="author" content="Reviwise" />
  <meta name="robots" content="index, follow" />
  <meta name="googlebot" content="index, follow" />
  <meta name="google" content="notranslate" />

  {{/* Canonical */}}
  <link rel="canonical" href="{{ .Permalink }}" />

  {{/* Open Graph */}}
  <meta property="og:site_name" content="Reviwise" />
  <meta property="og:title" content="{{ .Title }}" />
  <meta property="og:description" content="{{ .Params.description }}" />
  <meta property="og:url" content="{{ .Permalink }}" />
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}" />
  <meta property="og:locale" content="{{ .Language.LanguageCode }}" />
  <meta property="og:image" content="{{ "banner.webp" | absURL }}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="{{ .Title }}" />

  {{/* Twitter Card */}}
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ .Title }}" />
  <meta name="twitter:description" content="{{ .Params.description }}" />
  <meta name="twitter:image" content="{{ "banner.webp" | absURL }}" />
  <meta name="twitter:image:alt" content="{{ .Title }}" />

  {{/* Favicons */}}
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}" />
  <link rel="icon" type="image/png" sizes="96x96" href="{{ "favicon-96x96.png" | relURL }}" />
  <link rel="shortcut icon" href="{{ "favicon.ico" | relURL }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | relURL }}" />
  <link rel="manifest" href="{{ "site.webmanifest" | relURL }}" />

  {{/* hreflang alternates */}}
  {{ range .AllTranslations }}
  <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}" />
  {{ end }}
  <link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}" />

  <script src="https://cdn.tailwindcss.com"></script>

  {{/* JSON-LD — home pages only */}}
  {{ if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Reviwise",
    "url": {{ .Permalink | jsonify }},
    "description": {{ .Params.description | jsonify }},
    "inLanguage": {{ .Language.LanguageCode | jsonify }},
    "image": {{ "banner.webp" | absURL | jsonify }},
    "publisher": {
      "@type": "Organization",
      "name": "Reviwise",
      "url": {{ .Site.BaseURL | jsonify }},
      "logo": {
        "@type": "ImageObject",
        "url": {{ "favicon-96x96.png" | absURL | jsonify }}
      }
    }
  }
  </script>
  {{ end }}
