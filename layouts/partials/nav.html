<nav class="container mx-auto px-4 sm:px-6 lg:px-8 py-6 flex items-center justify-between">
  <a href="{{ "/" | relLangURL }}" class="flex items-center">
    {{ partial "logo.html" . }}
    <h1 class="font-bold text-slate-900 text-2xl">Reviwise</h1>
  </a>

  <div class="flex items-center gap-3">
    <div class="flex items-center gap-2" id="lang-switcher">
      <select id="lang-select" onchange="window.location.href=this.value" class="px-3 py-1.5 text-sm font-medium rounded-md border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 transition-colors cursor-pointer">
        {{ range .AllTranslations }}
        <option value="{{ .Permalink }}" {{ if eq .Language.Lang $.Language.Lang }}selected{{ end }}>{{ upper .Language.Lang }}</option>
        {{ end }}
      </select>
    </div>
    <a href="app.reviwise.com" class="px-5 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-colors text-sm">{{ i18n "nav_login" }}</a>
  </div>
</nav>
